# kakukaku.cn production site
#
# - 5000 : nginx serving built SPA + reverse proxying /api & /uploads to :5001
# - 5001 : kakukaku-server (Express + PostgreSQL via PolarDB)
#
# Place under /etc/nginx/conf.d/ or include from nginx.conf.
# TLS is assumed terminated upstream (e.g. SLB / CDN); this block listens on plain 5000.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       5000;
    listen       [::]:5000;
    server_name  kakukaku.cn www.kakukaku.cn;

    root  /var/www/kakukaku/dist;
    index index.html;

    charset utf-8;
    client_max_body_size 32m;

    # gzip
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_vary on;

    # long-lived hashed assets
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg { add_header Cache-Control "public, max-age=86400"; try_files $uri =404; }
    location = /icons.svg   { add_header Cache-Control "public, max-age=86400"; try_files $uri =404; }

    # API reverse proxy
    location /api/ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # uploaded media passthrough
    location /uploads/ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # health probe passthrough (optional)
    location = /api/health {
        proxy_pass http://127.0.0.1:5001/api/health;
        access_log off;
    }

    # SPA fallback — all unmatched paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/kakukaku.access.log;
    error_log  /var/log/nginx/kakukaku.error.log warn;
}