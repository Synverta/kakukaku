# kakukaku.cn production site
#
# - 6001 : nginx serving built SPA + reverse proxying /api & /uploads to :6002
# - 6002 : kakukaku-server (Express + PostgreSQL via PolarDB)
#
# Place under /etc/nginx/conf.d/ or include from nginx.conf.
# Layout:
#   :80   (this file)         -> 301 redirect to https://
#   :443  (this file)         -> reverse-proxy https -> http://127.0.0.1:6001
#   :6001 (this file)         -> the upstream backend (SPA + /api + /uploads)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Plain-HTTP -> HTTPS redirect
server {
    listen       80;
    listen       [::]:80;
    server_name  kakukaku.cn www.kakukaku.cn;
    return       301 https://$host$request_uri;
}

# HTTPS -> upstream :6001 (which serves SPA + /api + /uploads)
server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    server_name  kakukaku.cn www.kakukaku.cn;

    ssl_certificate     /etc/letsencrypt/live/kakukaku.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kakukaku.cn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass         http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# Upstream: SPA + /api + /uploads (also reachable directly on :6001 for ops/debug)
server {
    listen       6001;
    listen       [::]:6001;
    server_name  kakukaku.cn www.kakukaku.cn;

    root  /var/www/kakukaku/dist;
    index index.html;

    charset utf-8;
    client_max_body_size 32m;

    # gzip
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_vary on;

    # long-lived hashed assets
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /favicon.svg { add_header Cache-Control "public, max-age=86400"; try_files $uri =404; }
    location = /icons.svg   { add_header Cache-Control "public, max-age=86400"; try_files $uri =404; }

    # API reverse proxy
    location /api/ {
        proxy_pass         http://127.0.0.1:6002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # uploaded media passthrough
    location /uploads/ {
        proxy_pass         http://127.0.0.1:6002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # health probe passthrough
    location = /api/health {
        proxy_pass http://127.0.0.1:6002/api/health;
        access_log off;
    }

    # SPA fallback — all unmatched paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/kakukaku.access.log;
    error_log  /var/log/nginx/kakukaku.error.log warn;
}
