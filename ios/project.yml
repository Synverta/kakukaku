name: Kakukaku
options:
  bundleIdPrefix: cn.kakukaku
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
targets:
  Kakukaku:
    type: application
    platform: iOS
    sources:
      - path: Kakukaku
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.kakukaku.app
        PRODUCT_NAME: Kakukaku
        INFOPLIST_FILE: Kakukaku/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
